<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Code Review Assistant{% endblock %}</title>

  <!-- Bootstrap (keep if you already include it elsewhere) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg0:#070A12;
      --bg1:#0B1020;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --shadow2: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 14px;
    }

    body{
      min-height:100vh;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(99,102,241,.35), transparent 60%),
        radial-gradient(900px 500px at 90% 10%, rgba(34,197,94,.20), transparent 55%),
        radial-gradient(900px 600px at 50% 100%, rgba(56,189,248,.18), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      letter-spacing: .2px;
    }

    .app-shell{
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 10px;
    }

    .brand-badge{
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(99,102,241,.9), rgba(56,189,248,.9));
      box-shadow: var(--shadow2);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 800;
      color: #06101b;
    }

    .brand h1{
      font-size: 16px;
      line-height: 1.1;
      margin:0;
      font-weight: 800;
      letter-spacing: .3px;
    }
    .brand p{
      margin:0;
      font-size: 12px;
      color: var(--muted);
    }

    .pill{
      border: 1px solid var(--border);
      background: rgba(255,255,255,.05);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      display:inline-flex;
      align-items:center;
      gap: 8px;
      box-shadow: 0 8px 22px rgba(0,0,0,.18);
    }

    /* Glass card */
    .glass-card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .card-header{
      background: transparent !important;
      border-bottom: 1px solid rgba(255,255,255,.08) !important;
      padding: 16px 18px;
    }

    .card-body{
      padding: 16px 18px;
    }

    /* Inputs */
    .form-label{
      color: var(--muted);
    }
    .form-select, .form-control{
      background: rgba(10,14,28,.7) !important;
      border: 1px solid rgba(255,255,255,.12) !important;
      color: var(--text) !important;
      border-radius: 14px !important;
    }
    .form-select:focus, .form-control:focus{
      box-shadow: 0 0 0 .25rem rgba(99,102,241,.18) !important;
      border-color: rgba(99,102,241,.55) !important;
    }

    /* Code textarea */
    .code-textarea{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.45;
      padding: 14px 14px;
      min-height: 420px;
      resize: vertical;
    }

    /* Buttons */
    .btn-modern{
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 26px rgba(0,0,0,.25);
    }
    .btn-modern.btn-info{
      color:#07101c;
      background: linear-gradient(135deg, rgba(56,189,248,1), rgba(99,102,241,1)) !important;
      border: 0 !important;
    }
    .btn-modern:disabled{
      opacity: .6;
      box-shadow: none;
    }

    /* Findings list */
    .findings-body{
      max-height: 560px;
      overflow: auto;
      padding-right: 6px;
    }
    .findings-body::-webkit-scrollbar{ width: 8px; }
    .findings-body::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.12);
      border-radius: 999px;
    }

    .issue-item{
      border-radius: var(--radius2) !important;
      border: 1px solid rgba(255,255,255,.10) !important;
      background: rgba(8,12,24,.65) !important;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }

    .badge{
      border-radius: 999px !important;
      font-weight: 700;
      letter-spacing: .3px;
    }

    .muted{
      color: var(--muted);
    }

    /* Footer note */
    .footer-note{
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="app-shell">

    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">AI</div>
        <div>
          <h1>Explainable Code Review Assistant</h1>
          <p>Paste code → review → get clear issues</p>
        </div>
      </div>

      <div class="pill">
        <span style="width:8px;height:8px;border-radius:999px;background:rgba(34,197,94,.9);display:inline-block;"></span>
        Local demo • Flask • GPT-4.1 mini
      </div>
    </div>

    {% block content %}{% endblock %}

    <div class="footer-note">
      Tip: Keep demos short. Paste one function and explain 1–2 issues only.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
